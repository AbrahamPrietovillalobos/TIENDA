<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1f2937, #111827);
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

#buscador {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
}

.carrito {
  background: #fff;
  color: #333;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.item-carrito {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}

.contenedor {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.tarjeta {
  background: #fff;
  color: #333;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* 🔥 IMAGEN CORREGIDA */
.tarjeta img {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: #f3f4f6;
  border-radius: 8px;
}

.nombre {
  font-weight: bold;
}

.descripcion {
  font-size: 13px;
  color: #666;
}

.footer {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.boton {
  background: #2d8cf0;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.boton:hover {
  background: #1a6ed8;
}

.eliminar {
  background: red;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.comprar {
  background: #22c55e;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.comprar:hover {
  background: #16a34a;
}

.item-carrito img {
  border-radius: 6px;
}

</style>
</head>

<body>

<h1>Tienda en línea 🛒</h1>

<input type="text" id="buscador" placeholder="Buscar producto...">

<div class="carrito">
  <h2>Carrito (<span id="contador">0</span>)</h2>
  <div id="lista-carrito"></div>
  <hr>
  <strong>Total: $<span id="total">0</span></strong>

  <button class="comprar" onclick="comprar()">Comprar</button>
</div>

<div class="contenedor" id="contenedor"></div>

<script>
const productos = [
  {id:1, nombre:"Arroz", precio:25, descripcion:"1 kg de arroz blanco", img:"arroz.jpg"},
  {id:2, nombre:"Leche", precio:22, descripcion:"Leche entera 1L", img:"leche.jpg"},
  {id:3, nombre:"Pan", precio:18, descripcion:"Pan de caja", img:"pan.jpg"},
  {id:4, nombre:"Huevos", precio:40, descripcion:"Docena de huevos", img:"huevos.jpg"},
  {id:5, nombre:"Café", precio:60, descripcion:"Café molido", img:"café.jpg"},
  {id:6, nombre:"Refresco", precio:20, descripcion:"Refresco 600ml", img:"refresco.jpg"},
  {id:7, nombre:"Agua", precio:12, descripcion:"Agua 1L", img:"agua.jpg"},
  {id:8, nombre:"Jabón", precio:14, descripcion:"Jabón de baño", img:"jabon.jpg"}
];

const contenedor = document.getElementById("contenedor");
const buscador = document.getElementById("buscador");
const listaCarrito = document.getElementById("lista-carrito");
const totalSpan = document.getElementById("total");
const contador = document.getElementById("contador");

let carrito = [];

function mostrarProductos(lista) {
  contenedor.innerHTML = "";

  lista.forEach(p => {
    contenedor.innerHTML += `
      <div class="tarjeta">
        <img src="${p.img}">
        <div class="nombre">${p.nombre}</div>
        <div class="descripcion">${p.descripcion}</div>
        <div class="footer">
          <div>$${p.precio}</div>
          <button class="boton" onclick="agregarCarrito(${p.id})">Agregar</button>
        </div>
      </div>
    `;
  });
}

function agregarCarrito(id) {
  const producto = productos.find(p => p.id === id);
  const existe = carrito.find(p => p.id === id);

  if (existe) {
    existe.cantidad++;
  } else {
    carrito.push({...producto, cantidad:1});
  }

  actualizarCarrito();
}

function eliminarProducto(id) {
  carrito = carrito.filter(p => p.id !== id);
  actualizarCarrito();
}

function actualizarCarrito() {
  listaCarrito.innerHTML = "";

  let total = 0;
  let totalItems = 0;

  carrito.forEach(p => {
    total += p.precio * p.cantidad;
    totalItems += p.cantidad;

    listaCarrito.innerHTML += `
      <div class="item-carrito">
        <img src="${p.img}" width="40" height="40">
        ${p.nombre} x${p.cantidad} - $${p.precio * p.cantidad}
        <button class="eliminar" onclick="eliminarProducto(${p.id})">X</button>
      </div>
    `;
  });

  totalSpan.textContent = total;
  contador.textContent = totalItems;
}

function comprar() {
  if (carrito.length === 0) {
    alert("Tu carrito está vacío");
    return;
  }

  let total = 0;

  carrito.forEach(p => {
    total += p.precio * p.cantidad;
  });

  alert("Compra realizada con éxito 🟢\nTotal pagado: $" + total);

  carrito = [];
  actualizarCarrito();
}

buscador.addEventListener("input", () => {
  const texto = buscador.value.toLowerCase();
  const filtrados = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto)
  );
  mostrarProductos(filtrados);
});

mostrarProductos(productos);
actualizarCarrito();
</script>

</body>
</html>
